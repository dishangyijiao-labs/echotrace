name: Build & Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon (arm64); Intel via Rosetta 2
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Bundle Python, FFmpeg, and model
        working-directory: apps/desktop
        run: ./bundle-deps.sh

      - name: Import Apple certificate for signing
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Sign bundled binaries for notarization
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          echo "Signing ffmpeg..."
          codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" apps/core/bin/ffmpeg

          echo "Signing Python binaries and libraries..."
          # Sign .dylib and .so files first (leaves of the dependency tree)
          find apps/core/python -type f \( -name "*.dylib" -o -name "*.so" \) | while read f; do
            codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" "$f" 2>/dev/null || true
          done
          # Sign python executables
          find apps/core/python/bin -type f -perm +111 -name "python*" | while read f; do
            codesign --force --options runtime --sign "$APPLE_SIGNING_IDENTITY" "$f" 2>/dev/null || true
          done

          echo "Verifying ffmpeg signature..."
          codesign -dv --verbose=2 apps/core/bin/ffmpeg

      - name: Write Apple API private key to file
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p /tmp/apple_keys
          chmod 700 /tmp/apple_keys
          echo "${{ secrets.APPLE_API_PRIVATE_KEY }}" > /tmp/apple_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          chmod 600 /tmp/apple_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8

      - name: Build (and publish release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: /tmp/apple_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          includeUpdaterJson: true
          projectPath: apps/desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('EchoTrace {0}', github.ref_name) || '' }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}
