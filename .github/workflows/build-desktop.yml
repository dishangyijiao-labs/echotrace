name: Build & Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - ".github/workflows/build-desktop.yml"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest   # Apple Silicon (arm64)
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
          - platform: macos-13       # Intel (x86_64)
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            rust-target: ""
          - platform: windows-latest
            args: ""
            rust-target: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Build (and publish release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('EchoTrace {0}', github.ref_name) || '' }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
