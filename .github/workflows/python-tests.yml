name: Python Tests

on:
  push:
    branches: [main, "pr-*"]
    paths:
      - "apps/core/**"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "apps/core/**"

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/core/requirements.txt

      - name: Install dependencies
        working-directory: apps/core
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install a stub for faster-whisper so tests can import pipeline modules
          pip install faster-whisper || echo "faster-whisper not available, tests will mock it"

      - name: Run tests
        working-directory: apps/core
        run: |
          pytest --tb=short -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.python-version }}
          path: apps/core/.pytest_cache/
