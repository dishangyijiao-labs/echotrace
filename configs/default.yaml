input_dir: "data/raw"
staging_dir: "data/staging"
output_dir: "data/clean"
manifest_db: "metadata.sqlite"

ffmpeg:
  chunk_seconds: 600
  target_samplerate: 16000
  audio_codec: "pcm_s16le"

whisper:
  model_size: "small"
  compute_type: "int8"
  language: "zh"
  device: "cpu"

cleaning:
  allowed_languages: ["zh-cn", "zh"]
  min_chars: 10
  max_chars: 2000
  strip_disfluencies: true
  normalize_punctuation: true
  drop_repeated_ratio: 0.6

export:
  formats: ["jsonl", "parquet"]
  report_samples: 20
