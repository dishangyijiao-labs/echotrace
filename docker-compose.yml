services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:15-alpine
    container_name: echotrace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: echotrace
      POSTGRES_USER: echotrace
      POSTGRES_PASSWORD: echotrace123
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5434:5432"  # 使用不同的外部端口避免冲突
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echotrace -d echotrace"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 服务 - 用作 Celery 消息队列和缓存
  redis:
    image: redis:7-alpine
    container_name: echotrace-redis
    restart: unless-stopped
    ports:
      - "6380:6379"  # 使用不同的外部端口避免冲突
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: echotrace-backend
    environment:
      - DJANGO_DEBUG=true
      - DJANGO_SECRET_KEY=changeme-in-prod
      - DJANGO_ALLOWED_HOSTS=localhost,backend
      - DJANGO_CORS_ALLOW_ALL=false
      - DJANGO_CORS_ALLOWED_ORIGINS=http://localhost:8080,http://localhost:5173
      - DJANGO_MEDIA_ROOT=/app/media
      - DJANGO_DB_ENGINE=django.db.backends.postgresql
      - DJANGO_DB_NAME=echotrace
      - DJANGO_DB_USER=postgres
      - DJANGO_DB_PASSWORD=postgres123
      - DJANGO_DB_HOST=postgres
      - DJANGO_DB_PORT=5432
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >-
      /bin/sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8001"

  # Celery Worker - 处理异步任务
  celery-worker:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: echotrace-worker
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: "changeme-in-prod"
      DJANGO_MEDIA_ROOT: "/app/media"
      # PostgreSQL 数据库配置
      DJANGO_DB_ENGINE: "django.db.backends.postgresql"
      POSTGRES_DB: "echotrace"
      POSTGRES_USER: "echotrace"
      POSTGRES_PASSWORD: "echotrace123"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      # Celery 和 Redis 配置
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      REDIS_URL: "redis://redis:6379/1"
    volumes:
      - backend_data:/app/data
      - backend_media:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    command: celery -A media_manager worker -l info --concurrency=2
    restart: unless-stopped

  # Celery Beat - 定时任务调度器
  celery-beat:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: echotrace-scheduler
    environment:
      DJANGO_DEBUG: "true"
      DJANGO_SECRET_KEY: "changeme-in-prod"
      # PostgreSQL 数据库配置
      DJANGO_DB_ENGINE: "django.db.backends.postgresql"
      POSTGRES_DB: "echotrace"
      POSTGRES_USER: "echotrace"
      POSTGRES_PASSWORD: "echotrace123"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      # Celery 和 Redis 配置
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    command: celery -A media_manager beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    restart: unless-stopped

  # Flower - Celery 任务监控界面（可选）
  flower:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: echotrace-flower
    environment:
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A media_manager flower --port=5555
    restart: unless-stopped
    profiles:
      - monitoring

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: http://localhost:8001/api
    container_name: echotrace-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

  pipeline:
    build:
      context: .
      dockerfile: docker/pipeline.Dockerfile
    container_name: echotrace-pipeline
    profiles:
      - pipeline
    working_dir: /app
    volumes:
      - ./pipeline_data/input:/app/input
      - ./pipeline_data/output:/app/output
      - ./pipeline_data/models:/app/models
      - ./pipeline_data/logs:/app/logs
      - ./config:/app/config:ro
    command: ["python", "-m", "src.pipeline.cli", "--help"]

volumes:
  backend_data:
  backend_media:
  postgres_data:
  redis_data:
