server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    error_page 404 /index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location /assets/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
}
