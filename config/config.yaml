paths:
  input_dir: "./input"
  output_dir: "./output"
  models_dir: "./models"
  logs_dir: "./logs"

nas:
  auto_scan_enabled: true
  scan_extensions:
    - ".mp3"
    - ".mp4"
    - ".wav"
    - ".m4a"
    - ".avi"
    - ".mkv"
    - ".flac"
    - ".aac"

transcribe:
  max_file_size: 2147483648  # 2GB
  timeout: 3600  # 1 hour
  engines:
    whisper:
      models:
        - tiny
        - base
        - small
        - medium
        - large
      default_model: small
      languages:
        - auto
        - zh
        - en
        - ja
        - ko

export:
  max_batch_size: 100
  temp_dir: "/tmp/echovault"
  formats:
    - txt
    - json
    - csv
    - zip

security:
  password_min_length: 8
  token_expiry_hours: 12
  max_login_attempts: 5
  lockout_duration_minutes: 30
